name: infusion_pump_app
description: ESP32-based Infusion/Syringe Pump Controller with Firebase RTDB
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_database: ^11.3.5
  firebase_messaging: ^15.2.5

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # UI & Charts
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Notifications & Background
  flutter_local_notifications: ^18.0.1
  flutter_background_service: ^5.0.12
  flutter_background_service_android: ^6.2.7

  # Audio
  audioplayers: ^6.1.0

  # Storage
  shared_preferences: ^2.5.3

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/drug_library/s_dose_cleaned.csv
